<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
 <style>
        /*
            CSS goes inside <style> tags
            CSS controls how elements LOOK (colors, sizes, spacing, layout)
            The format is: selector { property: value; }
        */

        /* The * selector means "apply this to EVERY element" */
        * {
            box-sizing: border-box; /* padding doesn't make elements wider than expected */
            margin: 0;              /* remove default spacing browsers add */
            padding: 0;
        }

        body {
            /* body is everything visible on the page */
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;    /* light grey background */
            min-height: 100vh;      /* vh = viewport height, 100vh = full screen height */

            /* Flexbox: a layout system for positioning elements */
            display: flex;
            align-items: center;     /* vertically center the content */
            justify-content: center; /* horizontally center the content */
        }

        .card {
            /*
                A "class" in CSS starts with a dot: .card
                In HTML you write: <div class="card">
                This lets you style specific elements without affecting others
            */
            background: white;
            border-radius: 14px;    /* rounded corners */
            padding: 40px;          /* space INSIDE the card */
            width: 100%;
            max-width: 400px;       /* never wider than 400px */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); /* subtle shadow */
        }

        h1 {
            font-size: 22px;
            font-weight: 700;       /* bold */
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #6b7280;         /* grey */
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;    /* space between each input field */
        }

        label {
            display: block;         /* label sits on its own line above the input */
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        input {
            width: 100%;            /* stretch to fill the card */
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a2e;
            outline: none;          /* removes the default blue browser outline */
            transition: border-color 0.2s; /* smooth color change when focused */
        }

        input:focus {
            /* :focus is a "pseudo-class" — styles applied when user clicks into the field */
            border-color: #6366f1;  /* purple border when active */
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;    /* purple */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;        /* shows hand cursor on hover */
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;    /* darker purple on hover */
        }

        .error {
            background: #fee2e2;    /* light red background */
            border-left: 3px solid #ef4444; /* red left border */
            color: #b91c1c;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style></head>
<body> 
    <div class="card">
    <h1>Login</h1>
            <p class="subtitle">Sign in to continue</p>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
<div class="form-group">
                <label for="username">Username</label>
   <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    autofocus
                    required
                />  
</div>
 <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                />
                <!-- type="password" hides the characters as dots -->
            </div>

            <button type="submit">Sign In</button>
            <!-- type="submit" tells the browser: clicking this sends the form -->

        </form>
    </div>

</body>
</html>
