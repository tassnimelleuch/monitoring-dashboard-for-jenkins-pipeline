<aside class="sidebar">
  <div class="sb-profile">
    <div class="avatar">{{ username[0]|upper if username else 'U' }}</div>
    <div>
      <div class="pname">{{ username }}</div>
      <div class="prole">{{ role }}</div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">☀️</button>
  </div>

  <div class="sb-jenkins">
    <div class="pulse-dot" id="statusDot"></div>
    <div>
      <div class="ji-label">Jenkins</div>
      <div class="ji-val" id="statusVal">Checking...</div>
    </div>
    <button class="refresh-btn" id="refBtn" onclick="doRefresh()" title="Refresh">
      <svg viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
  </div>

  <nav class="sb-nav">
    <div class="nav-item {% if active_page == 'overview' %}active{% endif %}"
         onclick="window.location.href='{{ url_for('jenkins.dashboard') }}'">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      <span class="nav-label">Overview</span>
    </div>

    <div class="nav-sep"></div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
      <span class="nav-label">Alerts</span>
      <span class="nav-badge">7</span>
    </div>

    <div class="nav-item {% if active_page == 'pipeline_kpis' %}active{% endif %}"
         onclick="window.location.href='{{ url_for('jenkins.pipeline_kpis') }}'">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      <span class="nav-label">Pipeline KPIs</span>
    </div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg></span>
      <span class="nav-label">Pipeline Details</span>
    </div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg></span>
      <span class="nav-label">GitHub Repo</span>
    </div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="1.05" y1="12" x2="7" y2="12"/><line x1="17.01" y1="12" x2="22.96" y2="12"/></svg></span>
      <span class="nav-label">Last Code Changes</span>
      <span class="nav-badge green">3</span>
    </div>

    <div class="nav-sep"></div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
      <span class="nav-label">Deployment KPIs</span>
    </div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
      <span class="nav-label">PDF Reports</span>
    </div>

    <div class="nav-sep"></div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      <span class="nav-label">Manage Users</span>
      <span class="nav-badge">{{ pending_count }}</span>
    </div>

    <div class="nav-item" onclick="setActive(this)">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
      <span class="nav-label">Settings</span>
    </div>
  </nav>

  <div class="sb-footer">
    <div class="nav-item ai-row" style="margin:0 -4px 8px;width:calc(100% + 8px);">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21l4-4 4 4"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><path d="M9 13.5c.83.67 1.67 1 3 1s2.17-.33 3-1"/></svg></span>
      <span class="nav-label">AI Assistant</span>
      <span class="ai-badge">BETA</span>
    </div>
    <div class="logout-row" onclick="window.location.href='{{ url_for('auth.logout') }}'">
      <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span>Logout</span>
    </div>
  </div>
</aside>
